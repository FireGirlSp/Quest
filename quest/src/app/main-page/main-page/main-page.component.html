<div class="main-block">
    <h1>Welcome!</h1>
    <mat-card class="card">
        <mat-card-header>
            <div mat-card-avatar class="header-image"></div>
            <!-- <mat-card-title>Чтобы определить местонахождение твоей девушки, необходимо разгадать первую загадку</mat-card-title> -->
            <mat-card-title class="card-title">Как называется песня, минус которой приведен ниже?</mat-card-title>
        </mat-card-header>
        <mat-card-content>
            <audio controls class="audio">
                <source src="assets/audio/Для тебя.mp3" type="audio/mpeg">
            </audio>
            <p></p>
            <form [formGroup]="formGroupControl" class="form">
                <mat-form-field appearance="legacy" class="form-field">
                    <mat-label>Ответ</mat-label>
                    <input matInput formControlName="answer">
                </mat-form-field>
            </form>
        </mat-card-content>
        <mat-card-actions class="actions">
            <button mat-button class="button" (click)="answer()"><span>Ответить</span></button>
            <!-- <button mat-button class="next button" [disabled]="true"><span>Далее</span></button> -->
          </mat-card-actions>
    </mat-card>
    <mat-card class="card">
        <mat-card-header class="password">
            <mat-card-title class="card-title">Для продолжения необходимо ввести код</mat-card-title>
            <!-- <mat-card-subtitle>Узнать код можно у Лизы</mat-card-subtitle> -->
        </mat-card-header>
        <mat-card-content>
            <form [formGroup]="formGroupPass" class="form">
                <mat-form-field appearance="legacy" class="form-field">
                    <mat-label>Введите код</mat-label>
                    <input matInput formControlName="pass" type="password">
                </mat-form-field>
            </form>
        </mat-card-content>
        <mat-card-actions class="actions">
            <button mat-button class="button" (click)="answerPass()"><span>Ответить</span></button>
            <!-- <button mat-button class="next button" [disabled]="true"><span>Далее</span></button> -->
          </mat-card-actions>
    </mat-card>
</div>
